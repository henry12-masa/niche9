<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>資格クイズ 第9弾｜土木・インフラ超ニッチ資格</title>
  <meta name="description" content="第9弾の資格クイズサイト。地質調査技士、コンクリート技士、RCCM、道路橋点検士など土木・インフラ系の超ニッチ資格200問からランダム50問を出題します。">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <button id="homeBtn" class="home-btn" type="button">ホームに戻る</button>
      <div>
        <p class="badge">資格クイズ 第9弾</p>
        <h1>土木・インフラ超ニッチ資格クイズ</h1>
        <p class="lead">10資格×各20問＝合計200問を収録。選択した資格からランダム50問を出題します。</p>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="ad ad-left"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802"
     crossorigin="anonymous"></script>
<!-- チェス -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8398161859137802"
     data-ad-slot="5599163841"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script></aside>

    <main class="main">
      <section id="homeScreen" class="card">
        <h2>資格を選択してください</h2>
        <p class="muted">第9弾は土木・インフラ・橋梁・河川・コンクリート系の超ニッチ資格を中心に収録しています。</p>
        <div id="examGrid" class="exam-grid"></div>
      </section>

      <section id="quizScreen" class="card hidden">
        <div class="quiz-top">
          <div>
            <p id="examTitle" class="badge"></p>
            <h2 id="questionTitle">問題</h2>
          </div>
          <div class="score-box">
            <span id="progressText">0 / 50</span>
            <strong id="scoreText">正解 0</strong>
          </div>
        </div>
        <div class="bar"><div id="barFill"></div></div>
        <p id="questionText" class="question"></p>
        <div id="choices" class="choices"></div>
        <div id="feedback" class="feedback hidden"></div>
      </section>

      <section id="resultScreen" class="card hidden result">
        <p class="badge">結果</p>
        <h2 id="resultTitle">お疲れさまでした</h2>
        <p id="resultScore" class="result-score"></p>
        <div class="result-actions">
          <button id="retryBtn" class="primary" type="button">もう一度挑戦</button>
          <button id="backHomeBtn" type="button">ホームへ戻る</button>
        </div>
      </section>
    </main>

    <aside class="ad ad-right"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802"
     crossorigin="anonymous"></script>
<!-- チェス -->
<ins class="adsbygoogle"
     style="display:block"

     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script></aside>
  </div>

  <footer>
    <p>© 資格クイズ 第9弾</p>
